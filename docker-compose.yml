services:
  php:
    build: docker/php
    container_name: rocketreport_php
    volumes:
      - ./backend:/var/www
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: rocketreport_nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  adminer:
    image: adminer
    container_name: rocketreport_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: rocketreport_db
    environment:
      MYSQL_DATABASE: rocketreport
      MYSQL_USER: rocket
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
