version: '3.8'

services:
  # 🗄️ Base de Données MySQL
  mysql:
    image: mysql:8.0
    container_name: rocketreport-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rocket_report
      MYSQL_USER: rocketreport
      MYSQL_PASSWORD: password123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - rocketreport-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5

  # 🎨 Interface PhpMyAdmin
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: rocketreport-phpmyadmin
    ports:
      - "8081:80"
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    networks:
      - rocketreport-network

  # 🔴 Redis (Cache & Queue)
  redis:
    image: redis:7-alpine
    container_name: rocketreport-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rocketreport-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 5

  # 🚀 Backend Symfony
  backend:
    container_name: rocketreport-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
    
      - ./backend:/var/www/html
    ports:
      - "8000:80"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://rocketreport:password123@mysql:3306/rocket_report?serverVersion=8.0.32&charset=utf8mb4"
      REDIS_URL: "redis://redis:6379"
      APP_ENV: dev
      APP_DEBUG: "1"
    networks:
      - rocketreport-network

volumes:
  db_data:
  redis_data:

networks:
  rocketreport-network:
    driver: bridge
