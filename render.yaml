services:
  - type: static
    name: rocketreport-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  - type: web
    name: rocketreport-mcp
    env: node
    rootDir: mcp-rocketreport
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ROCKETREPORT_API_URL
        sync: false # Ajoute ici l'URL de ton backend Symfony de prod depuis le dashboard Render
