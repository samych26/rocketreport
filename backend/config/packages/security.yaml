security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: "auto"

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            id: App\Infrastructure\Security\UserProvider

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        
        # Firewall for public authentication routes
        auth:
            pattern: ^/api/auth/(register|login|refresh|forgot-password|reset-password|verify-email|google)
            stateless: true
            security: false

        # Admin firewall — session-based, requires ROLE_ADMIN
        admin:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: admin
                username_parameter: email
                password_parameter: password
            logout:
                path: admin_logout
                target: admin_login
        
        # Main firewall for protected API routes
        main:
            pattern: ^/
            stateless: true
            provider: app_user_provider
            jwt: ~

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin,       roles: ROLE_ADMIN }
        # All other /api routes require ROLE_USER
        - { path: ^/api,         roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
