doctrine:
    dbal:
        driver: '%env(default:pdo_mysql:DATABASE_DRIVER)%'
        host: '%env(default:localhost:DATABASE_HOST)%'
        port: '%env(default:3306:DATABASE_PORT)%'
        user: '%env(default:db_user:DATABASE_USER)%'
        password: '%env(default:db_password:DATABASE_PASSWORD)%'
        dbname: '%env(default:db_name:DATABASE_NAME)%'
        server_version: '8.0'
        charset: utf8mb4
        profiling_collect_backtrace: '%kernel.debug%'
        use_savepoints: true
        options:
            1014: false # PDO::MYSQL_ATTR_SSL_VERIFY_SERVER_CERT
    orm:
        auto_generate_proxy_classes: true
        enable_lazy_ghost_objects: true
        report_fields_where_declared: true
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Domain/Entity'
                prefix: 'App\Domain\Entity'
                alias: App
        controller_resolver:
            auto_mapping: false

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            auto_generate_proxy_classes: false
            proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
