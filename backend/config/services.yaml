# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: "../src/"

    # --- Repository Bindings (Hexagonal Architecture) ---
    App\Domain\Repository\UserRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\UserRepository'
    App\Domain\Repository\RefreshTokenRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\RefreshTokenRepository'
    App\Domain\Repository\ApiSourceRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineApiSourceRepository'
    App\Domain\Repository\DocumentRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineDocumentRepository'
    App\Domain\Repository\DocumentVariableRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineDocumentVariableRepository'
    App\Domain\Repository\DocumentGenerationRepositoryInterface: '@App\Infrastructure\Persistence\DoctrineDocumentGenerationRepository'
    App\Domain\Repository\TemplateRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\DoctrineTemplateRepository'
    App\Domain\Repository\CodeProcessorRepositoryInterface: '@App\Infrastructure\Persistence\Doctrine\Repository\DoctrineCodeProcessorRepository'

    # --- Domain Services & Infrastructure Adapters ---
    App\Application\Service\TokenManagerInterface: '@App\Infrastructure\Security\JwtTokenManager'
    App\Domain\Service\RefreshTokenGeneratorInterface: '@App\Infrastructure\Security\RefreshTokenGenerator'
    App\Domain\Service\PasswordHasherInterface: '@App\Infrastructure\Security\SymfonyPasswordHasherAdapter'

    # --- Arguments for specific services ---
    App\Application\Service\DocumentGenerationService:
        arguments:
            $generatedFilesPath: '%kernel.project_dir%/public/generated'

    App\Infrastructure\External\CodeExecution\JavaScriptSandboxService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Infrastructure\External\PdfGeneration\SnappyPdfService:
        arguments:
            $wkhtmltopdfBinary: '/usr/bin/wkhtmltopdf'
