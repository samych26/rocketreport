# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Domain/Entity/'
            - '../src/Domain/ValueObject/'
            - '../src/Application/DTO/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Domain\Repository\UserRepository: '@App\Infrastructure\Persistence\Doctrine\Repository\UserRepositoryDoctrine'
    App\Domain\Repository\TemplateRepository: '@App\Infrastructure\Persistence\Doctrine\Repository\TemplateRepositoryDoctrine'
    App\Domain\Repository\ApiSourceRepository: '@App\Infrastructure\Persistence\Doctrine\Repository\ApiSourceRepositoryDoctrine'
    App\Domain\Repository\AuditLogRepository: '@App\Infrastructure\Persistence\Doctrine\Repository\AuditLogRepositoryDoctrine'
    App\Domain\Repository\DocumentGenerationRepository: '@App\Infrastructure\Persistence\Doctrine\Repository\DocumentGenerationRepositoryDoctrine'
    App\Domain\Repository\RefreshTokenRepository: '@App\Infrastructure\Persistence\Doctrine\Repository\RefreshTokenRepositoryDoctrine'

    # Services
    App\Domain\Service\DocumentGenerator: '@App\Infrastructure\Service\TwigDocumentGenerator'
    App\Domain\Service\ApiClient: '@App\Infrastructure\Service\GuzzleApiClient'
    App\Domain\Service\AuditService: '@App\Infrastructure\Service\LoggerAuditService'
    App\Domain\Service\PasswordHasher: '@App\Infrastructure\Security\SymfonyPasswordHasher'
